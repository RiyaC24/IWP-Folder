<!DOCTYPE html>
<html>
<head>
    <title>Employee Payroll System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f6f9;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 70%;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        button {
            padding: 8px 15px;
            margin: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<h2>Employee Payroll System</h2>
<button onclick="calculatePayroll()">Generate Payroll</button>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Basic Salary</th>
            <th>HRA (20%)</th>
            <th>DA (10%)</th>
            <th>Gross Pay</th>
            <th>Tax (5%)</th>
            <th>Net Pay</th>
        </tr>
    </thead>
    <tbody id="payrollTable"></tbody>
</table>

<script>

// JSON array storing employee salary details
const employees = [
    { id: 1, name: "Rahul", basic: 50000 },
    { id: 2, name: "Anita", basic: 60000 },
    { id: 3, name: "Meghana", basic: 55000 }
];

function calculatePayroll() {

    let output = "";
    const table = document.getElementById("payrollTable");
    table.innerHTML = "";

    employees.forEach(emp => {

        let hra = emp.basic * 0.20;
        let da = emp.basic * 0.10;
        let gross = emp.basic + hra + da;
        let tax = gross * 0.05;
        let net = gross - tax;

        output += `
            <tr>
                <td>${emp.id}</td>
                <td>${emp.name}</td>
                <td>${emp.basic}</td>
                <td>${hra}</td>
                <td>${da}</td>
                <td>${gross}</td>
                <td>${tax}</td>
                <td>${net}</td>
            </tr>
        `;
    });

    table.innerHTML = output;
}

</script>

</body>
</html>
