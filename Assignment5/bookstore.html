<!DOCTYPE html>
<html>
<head>
    <title>Online Book Store</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f2f2f2;
        }

        select, input, button {
            padding: 8px;
            margin: 10px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>

<h2>Online Book Store</h2>

<!-- Filter Options -->
<select id="authorFilter">
    <option value="">All Authors</option>
    <option value="Chetan Bhagat">Chetan Bhagat</option>
    <option value="J.K. Rowling">J.K. Rowling</option>
    <option value="R.K. Narayan">R.K. Narayan</option>
</select>

<input type="number" id="priceFilter" placeholder="Max Price">

<button onclick="filterBooks()">Filter Books</button>

<table>
    <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Price</th>
            <th>Category</th>
        </tr>
    </thead>
    <tbody id="bookTable"></tbody>
</table>

<script>

// Nested JSON Book Catalog
const bookstore = {
    books: [
        {
            title: "Five Point Someone",
            author: "Chetan Bhagat",
            price: 300,
            details: {
                category: "Fiction",
                year: 2004
            }
        },
        {
            title: "Harry Potter",
            author: "J.K. Rowling",
            price: 500,
            details: {
                category: "Fantasy",
                year: 1997
            }
        },
        {
            title: "Malgudi Days",
            author: "R.K. Narayan",
            price: 250,
            details: {
                category: "Classic",
                year: 1943
            }
        }
    ]
};

// Display all books initially
displayBooks(bookstore.books);

function displayBooks(bookList) {
    let output = "";
    const table = document.getElementById("bookTable");
    table.innerHTML = "";

    bookList.forEach(book => {
        output += `
            <tr>
                <td>${book.title}</td>
                <td>${book.author}</td>
                <td>₹${book.price}</td>
                <td>${book.details.category}</td>
            </tr>
        `;
    });

    table.innerHTML = output;
}

function filterBooks() {
    const author = document.getElementById("authorFilter").value;
    const maxPrice = document.getElementById("priceFilter").value;

    let filtered = bookstore.books.filter(book => {

        let authorMatch = author === "" || book.author === author;
        let priceMatch = maxPrice === "" || book.price <= maxPrice;

        return authorMatch && priceMatch;
    });

    displayBooks(filtered);
}

</script>

</body>
</html>
