<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Cart</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f9;
        }

        .product, .cart {
            margin: 20px auto;
            width: 60%;
            background: white;
            padding: 15px;
            border-radius: 5px;
        }

        button {
            padding: 5px 10px;
            margin: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>

<h2>E-Commerce Cart System</h2>

<div class="product">
    <h3>Products</h3>
    <div id="productList"></div>
</div>

<div class="cart">
    <h3>Your Cart</h3>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cartTable"></tbody>
    </table>
    <h3 id="total"></h3>
</div>

<script>

// Product Catalog (JSON)
const products = [
    { id: 1, name: "Laptop", price: 50000 },
    { id: 2, name: "Mobile", price: 20000 },
    { id: 3, name: "Headphones", price: 3000 }
];

// Load cart from session (localStorage)
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Display Products
function displayProducts() {
    let output = "";
    products.forEach(product => {
        output += `
            <p>
                ${product.name} - ₹${product.price}
                <button onclick="addToCart(${product.id})">Add to Cart</button>
            </p>
        `;
    });
    document.getElementById("productList").innerHTML = output;
}

// Add Product to Cart
function addToCart(id) {
    const product = products.find(p => p.id === id);
    cart.push(product);
    saveCart();
    displayCart();
}

// Remove Product
function removeFromCart(index) {
    cart.splice(index, 1);
    saveCart();
    displayCart();
}

// Save Cart in session
function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

// Display Cart
function displayCart() {
    let output = "";
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price;
        output += `
            <tr>
                <td>${item.name}</td>
                <td>₹${item.price}</td>
                <td><button onclick="removeFromCart(${index})">Remove</button></td>
            </tr>
        `;
    });

    document.getElementById("cartTable").innerHTML = output;
    document.getElementById("total").innerHTML = "Total: ₹" + total;
}

// Initial Load
displayProducts();
displayCart();

</script>

</body>
</html>
